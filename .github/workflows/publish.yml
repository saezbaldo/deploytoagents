name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npm test
      - id: release
        shell: bash
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
            echo "npm_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "npm_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.release.outputs.npm_exists == 'false'
        run: npm publish

  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - id: release
        shell: bash
        run: |
          project_name=$(python -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['name'])")
          project_version=$(python -c "import tomllib; print(tomllib.load(open('python/pyproject.toml','rb'))['project']['version'])")
          if curl --fail --silent "https://pypi.org/pypi/$project_name/$project_version/json" >/dev/null; then
            echo "pypi_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "pypi_exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.release.outputs.pypi_exists == 'false'
        run: python -m pip install build
      - if: steps.release.outputs.pypi_exists == 'false'
        run: python -m build
        working-directory: python
      - if: steps.release.outputs.pypi_exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/
